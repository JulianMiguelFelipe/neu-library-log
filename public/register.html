<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("Ypm-3ZCOlib67Z1GWsEY");
        })();
    </script>
</head>
<body class="registration-page">
<div class="reg-card">
    <div id="form-container">
        <h2 class="text-center fw-bold mb-2">First Time?</h2>
        <p class="text-center text-muted mb-4">Complete your profile to log your visit.</p>
        <form id="regForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-control" placeholder="Enter first name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-control" placeholder="Enter last name" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Institutional Email</label>
                <input type="email" id="email" class="form-control" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select id="role" class="form-select" onchange="toggleRoleFields()" required>
                    <option value="">Select Role</option>
                    <option value="Student">Student</option>
                    <option value="Faculty">Faculty</option>
                </select>
            </div>
            
            <div id="student-fields" style="display:none;">
                <div class="mb-3">
                    <label class="form-label">College</label>
                    <select id="college" class="form-select" onchange="updatePrograms()">
                        <option value="" selected disabled>Select College</option>
                        <option value="CICS">College of Informatics and Computing Studies (CICS)</option>
                        <option value="CEA">College of Engineering and Architecture (CEA)</option>
                        <option value="Medicine">College of Medicine</option>
                        <option value="Nursing">College of Nursing</option>
                        <option value="MedTech">College of Medical Technology</option>
                        <option value="PT">College of Physical Therapy</option>
                        <option value="RT">College of Respiratory Therapy</option>
                        <option value="Midwifery">College of Midwifery</option>
                        <option value="Accountancy">College of Accountancy</option>
                        <option value="CBA">College of Business Administration</option>
                        <option value="Criminology">College of Criminology</option>
                        <option value="Law">College of Law</option>
                        <option value="CAS">College of Arts and Sciences</option>
                        <option value="Communication">College of Communication</option>
                        <option value="Education">College of Education</option>
                        <option value="Music">College of Music</option>
                        <option value="Agriculture">College of Agriculture</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Program/Course</label>
                    <select id="program" class="form-select" disabled>
                        <option value="" selected disabled>Select College first</option>
                    </select>
                </div>
            </div>

            <div id="faculty-fields" style="display:none;">
    <div class="mb-3">
    <label class="form-label">Department</label>
    <select id="department" class="form-select">
        <option value="" selected disabled>Select Department</option>
        <option value="CICS">College of Informatics and Computing Studies</option>
        <option value="CEA">College of Engineering and Architecture</option>
        <option value="Medicine">College of Medicine</option>
        <option value="Nursing">College of Nursing</option>
        <option value="MedTech">College of Medical Technology</option>
        <option value="PT">College of Physical Therapy</option>
        <option value="RT">College of Respiratory Therapy</option>
        <option value="Midwifery">College of Midwifery</option>
        <option value="Accountancy">College of Accountancy</option>
        <option value="CBA">College of Business Administration</option>
        <option value="Criminology">College of Criminology</option>
        <option value="Law">College of Law</option>
        <option value="CAS">College of Arts and Sciences</option>
        <option value="Communication">College of Communication</option>
        <option value="Education">College of Education</option>
        <option value="Music">College of Music</option>
        <option value="Agriculture">College of Agriculture</option>
    </select>
    </div>
                <div class="mb-3">
                    <label class="form-label">Position</label>
                    <select id="position" class="form-select">
                        <option value="" selected disabled>Select Position</option>
                        <option value="President">President</option>
                        <option value="Vice President">Vice President</option>
                        <option value="Dean">Dean</option>
                        <option value="Associate Dean">Associate Dean</option>
                        <option value="Department Chair">Department Chair</option>
                        <option value="Program Head / Coordinator">Program Head / Coordinator</option>
                        <option value="Faculty Member / Professor">Professor</option>
                        <option value="Assistant Professor">Assistant Professor</option>
                        <option value="Instructor / Lecturer">Instructor / Lecturer</option>
                        <option value="Support Staff">Support Staff</option>
                        <option value="Maintenance Staff">Maintenance Staff</option>
                        <option value="General Services">General Services</option>
                        <option value="Facilities Team">Facilities Team</option>
                        <option value="Operations Staff">Operations Staff</option>
                    </select>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-4 py-2 fw-bold">Create Profile & Get QR</button>
        </form>
    </div>
    <div id="qr-result" style="display:none;"> <div class="text-center">
            <div class="mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="#198754" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                </svg>
            </div>
            <h2 class="fw-bold text-success mb-2">Registration Successful!</h2>
            <div class="alert alert-primary py-3 mb-4">
                <p class="mb-1"><strong>Check your NEU Email!</strong></p>
                <p class="small mb-0">We sent your permanent QR code to <strong><span id="display-email"></span></strong>.</p>
            </div>
            <p class="text-muted fw-bold">OR TAKE A PHOTO OF THIS NOW:</p>
            <div id="qrcode" class="mb-4 d-flex justify-content-center shadow-sm p-3 bg-white rounded" style="width: fit-content; margin: 0 auto;"></div>
            <button class="btn btn-primary btn-lg w-100 py-3 fw-bold" onclick="window.location.href='index.html'">
                Done! Proceed to Login
            </button>
        </div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const emailField = document.getElementById('email');
    emailField.value = urlParams.get('email') || "";

    const programData = {
        "CICS": ["BS Information Technology", "BS Computer Science", "BS Information Systems", "BS Entertainment and Multimedia Computing", "Bachelor of Library and Information Science"],
        "CEA": ["BS Architecture", "BS Civil Engineering", "BS Electrical Engineering", "BS Electronics Engineering", "BS Industrial Engineering", "BS Mechanical Engineering", "BS Astronomy"],
        "Medicine": ["Doctor of Medicine"],
        "Nursing": ["BS Nursing"],
        "MedTech": ["BS Medical Technology"],
        "PT": ["BS Physical Therapy"],
        "RT": ["BS Respiratory Therapy"],
        "Midwifery": ["Diploma in Midwifery"],
        "Accountancy": ["BS Accountancy", "BS Accounting Information System"],
        "CBA": ["BSBA major in Financial Management", "BSBA major in Human Resource Development Management", "BSBA major in Legal Management", "BSBA major in Marketing Management", "BS Entrepreneurship", "BS Real Estate Management"],
        "Criminology": ["BS Criminology"],
        "Law": ["Juris Doctor (JD)"],
        "CAS": ["BA Economics", "BA Political Science", "BS Biology", "BS Psychology", "Bachelor of Public Administration"],
        "Communication": ["BA Communication", "BA Broadcasting", "BA Journalism"],
        "Education": ["Bachelor of Elementary Education", "Bachelor of Secondary Education"],
        "Music": ["Bachelor of Music"],
        "Agriculture": ["BS Agriculture"]
    };

    function updatePrograms() {
        const college = document.getElementById('college').value;
        const programSelect = document.getElementById('program');
        programSelect.innerHTML = '<option value="" selected disabled>Select Program</option>';
        
        if (programData[college]) {
            programSelect.disabled = false;
            programData[college].forEach(p => {
                let opt = document.createElement('option');
                opt.value = p;
                opt.innerHTML = p;
                programSelect.appendChild(opt);
            });
        } else {
            programSelect.disabled = true;
        }
    }

    function toggleRoleFields() {
        const role = document.getElementById('role').value;
        const studentFields = document.getElementById('student-fields');
        const facultyFields = document.getElementById('faculty-fields');
        studentFields.style.display = role === 'Student' ? 'block' : 'none';
        facultyFields.style.display = role === 'Faculty' ? 'block' : 'none';
        
        document.getElementById('college').required = (role === 'Student');
        document.getElementById('program').required = (role === 'Student');
        document.getElementById('department').required = (role === 'Faculty');
        document.getElementById('position').required = (role === 'Faculty');
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Saving Profile...";

        const role = document.getElementById('role').value;
        const email = emailField.value;
        const firstName = document.getElementById('firstName').value;

        const payload = {
            firstName: firstName,
            lastName: document.getElementById('lastName').value,
            email: email,
            role: role,
            college: role === 'Student' ? document.getElementById('college').value : null,
            program: role === 'Student' ? document.getElementById('program').value : null,
            department: role === 'Faculty' ? document.getElementById('department').value : null,
            position: role === 'Faculty' ? document.getElementById('position').value : null
        };

        try {
            const response = await fetch('/api/register', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });

            if (response.ok) { 
                submitBtn.innerText = "Sending Email...";
                emailjs.send("service_c0qzivb", "template_mpsikdd", {
                    firstName: firstName,
                    email: email
                }, "pm-3ZCOlib67Z1GWs")
                .then(() => { console.log("Email sent!"); })
                .catch((err) => { console.error("EmailJS error:", err); })
                .finally(() => {
                    document.getElementById('display-email').innerText = email;
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('qr-result').style.display = 'block';
                    new QRCode(document.getElementById("qrcode"), {
                        text: email,
                        width: 200,
                        height: 200,
                        colorDark : "#004a99",
                        colorLight : "#ffffff"
                    });
                });
            } else {
                alert("Registration failed. Please try again.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Profile & Get QR";
            }
        } catch (error) {
            console.error("Connection error:", error);
            alert("Connection error. Is the server running?");
            submitBtn.disabled = false;
            submitBtn.innerText = "Create Profile & Get QR";
        }
    });
</script>
</body>
</html>
