<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NEU Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="full-center">
    <div class="auth-card">
        <h3 class="neu-logo">NEU LIBRARY</h3>
        <h5 class="text-center mb-4">Create Account</h5>
        
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Institutional Email</label>
                <input type="email" id="regEmail" class="form-control" placeholder="name@neu.edu.ph" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Program/Course</label>
                <input type="text" id="regProgram" class="form-control" placeholder="BSCS" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="regPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        
        <div class="text-center mt-3">
            <p>Already have an account? <a href="index.html">Login here</a></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const userData = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            program: document.getElementById('regProgram').value,
            password: document.getElementById('regPassword').value
        };

        // This will talk to your backend later
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });

        if (response.ok) {
            alert('Registration Successful! Redirecting to login...');
            window.location.href = 'index.html';
        } else {
            alert('Error creating account. Email might already exist.');
        }
    });
</script>

</body>
</html>
