<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NEU Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-container" class="full-center">
    <div class="auth-card">
        <h3 class="neu-logo">NEU LIBRARY</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Institutional Email</label>
                <input type="email" id="loginEmail" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <hr>
        <button onclick="window.location.href='register.html'" class="btn btn-outline-secondary w-100">Create an Account</button>
    </div>
</div>

<div id="welcome-screen">
    <h1 id="welcome-name">Welcome, Name!</h1>
    <h3 id="welcome-program">Program</h3>
    <br>
    <h2 class="fw-bold">Welcome to NEU Library!</h2>
    <p class="mt-5 text-light opacity-75">Press [SPACEBAR] to return to login</p>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const loginContainer = document.getElementById('login-container');
    const welcomeScreen = document.getElementById('welcome-screen');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Ask for purpose of visit via prompt as requested
        const reason = prompt("What is your purpose for visiting the library today?");
        
        if (!reason) {
            alert("Purpose is required to enter.");
            return;
        }

        const credentials = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
            reason: reason
        };

        // Sending to Backend (Part 3)
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(credentials)
        });

        if (response.ok) {
            const data = await response.json();
            
            // Success! Update Welcome Screen
            document.getElementById('welcome-name').innerText = data.user.name;
            document.getElementById('welcome-program').innerText = data.user.program;
            
            // Hide Login, Show Welcome
            loginContainer.style.display = 'none';
            welcomeScreen.style.display = 'flex';
        } else {
            alert('Invalid credentials or you are BLOCKED by Admin.');
        }
    });

    // Spacebar Listener to Reset
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && welcomeScreen.style.display === 'flex') {
            window.location.reload(); // Returns to Login Page
        }
    });
</script>

</body>
</html>
