<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NEU Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --neu-blue: #004a99; 
            --neu-yellow: #ffcc00;
        }

        body { 
            background: linear-gradient(rgba(0, 74, 153, 0.8), rgba(20, 20, 20, 0.8)), 
                        url('https://i.imgur.com/NCXhBtu.jpeg');
            background-size: cover;
            background-position: center;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            padding: 2.5rem !important;
        }

        .logo-text { 
            color: var(--neu-blue); 
            font-weight: 800; 
            letter-spacing: -1px;
            font-size: 1.8rem;
            margin-bottom: 0;
        }

        .admin-label {
            background: var(--neu-yellow);
            color: #333;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 50px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .form-label {
            font-weight: 600;
            color: #555;
            font-size: 0.85rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--neu-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 74, 153, 0.1);
        }

        .btn-primary { 
            background-color: var(--neu-blue); 
            border: none; 
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover { 
            background-color: #003366; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 74, 153, 0.3);
        }

        .alert-danger {
            border-radius: 10px;
            font-size: 0.9rem;
            border: none;
            background-color: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card login-card shadow">
    <div class="text-center mb-4">
        <h4 class="logo-text">NEU Library</h4>
        <div class="admin-label">Administrator Access</div>
    </div>
    
    <div id="loginError" class="alert alert-danger d-none text-center" role="alert">
        Invalid username or password.
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Admin ID" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login to Dashboard</button>
    </form>
    
    <div class="text-center mt-4">
        <small class="text-muted">© 2026 By Julian Miguel I. Felipe </small>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');

        try {
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include', // Ensures the session/cookie is saved correctly
                body: JSON.stringify({ user, pass })
            });

            if (response.ok) {
                window.location.href = '/admin.html';
            } else {
                errorDiv.classList.remove('d-none');
            }
        } catch (err) {
            console.error("Login error:", err);
            alert("An error occurred. Please try again.");
        }
    });
</script>

</body>
</html>
