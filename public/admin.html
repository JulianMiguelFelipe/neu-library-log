<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NEU Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background: #004a99; color: white; padding: 20px; }
        .stat-card { border: none; border-radius: 10px; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <main class="col-md-12 ms-sm-auto px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">NEU Library Admin Dashboard</h1>
                <button onclick="downloadPDF()" class="btn btn-danger">Export to PDF</button>
            </div>

            <div class="row mb-4" id="stats-container">
                <div class="col-md-3">
                    <div class="card stat-card bg-primary text-white p-3">
                        <h5>Today</h5>
                        <h2 id="stat-day">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-success text-white p-3">
                        <h5>This Week</h5>
                        <h2 id="stat-week">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-info text-white p-3">
                        <h5>This Month</h5>
                        <h2 id="stat-month">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-dark text-white p-3">
                        <h5>Total Visitors</h5>
                        <h2 id="stat-total">0</h2>
                    </div>
                </div>
            </div>

            <div class="card p-3 mb-4">
                <div class="row">
                    <div class="col-md-8">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by Name, Program, or Reason...">
                    </div>
                    <div class="col-md-4">
                        <select id="dateFilter" class="form-select">
                            <option value="all">All Time</option>
                            <option value="today">Today</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover" id="visitorTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Program</th>
                            <th>Reason</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="visitorLogs">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script>
    let allLogs = [];

    async function fetchAdminData() {
        const response = await fetch('/api/admin/data');
        const data = await response.json();
        allLogs = data.logs;
        
        // Update Stats
        document.getElementById('stat-day').innerText = data.stats.day;
        document.getElementById('stat-week').innerText = data.stats.week;
        document.getElementById('stat-month').innerText = data.stats.month;
        document.getElementById('stat-total').innerText = allLogs.length;

        renderTable(allLogs);
    }

    function renderTable(logs) {
        const tbody = document.getElementById('visitorLogs');
        tbody.innerHTML = logs.map(log => `
            <tr>
                <td>${log.name}</td>
                <td>${log.program}</td>
                <td>${log.reason}</td>
                <td>${new Date(log.visit_time).toLocaleString()}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="blockUser(${log.user_id})">Block</button>
                </td>
            </tr>
        `).join('');
    }

    // Search Logic
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allLogs.filter(log => 
            log.name.toLowerCase().includes(term) || 
            log.program.toLowerCase().includes(term) || 
            log.reason.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });

    async function blockUser(userId) {
        if(confirm("Are you sure you want to block this user from entering the library?")) {
            await fetch('/api/admin/block', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId })
            });
            alert("User Blocked");
            fetchAdminData();
        }
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("NEU Library Visitor Logs", 14, 15);
        doc.autoTable({ html: '#visitorTable' });
        doc.save("library-logs.pdf");
    }

    fetchAdminData();
</script>
</body>
</html>
